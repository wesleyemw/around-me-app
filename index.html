<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AroundMe App</title>
    <link rel="stylesheet" type="text/css" href="src/css/home.css" />
    <script src="./src/js/app.js" type="module"></script>
  </head>
  <body>
    <div class="home-content">
      <header>
        <h2>Create a new map</h2>
        <form id="search-cities">
          <input type="search" name="search-place" id="search-place" />
          <button type="submit">Search</button>
        </form>
        <!-- search resul element -->
        <section id="search-results" popover></section>
        <template>
          <dialog popover></dialog>
        </template>
      </header>
      <main id="home">
        <!--
        <nav>
          <a href="pages/map/">map</a>
        </nav>
        -->
        <section class="projects">
          <div class="container">
            <hgroup>
              <h3>Saved maps</h3>
            </hgroup>
            <p>You don't have any maps yet.</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>

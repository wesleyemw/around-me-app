<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapLibre App</title>

    <link
      rel="preload"
      href="./node_modules/inter-ui/variable/InterVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="./node_modules/inter-ui/variable/InterVariable-Italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="./src/fonts/HostGrotesk-Variable-Roman.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./src/fonts/HostGrotesk-Variable-Italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link rel="stylesheet" type="text/css" href="../../src/css/map.css" />
  </head>
  <body>
    <main id="map">
      <div class="overlay left">
        <!-- <p>this is an overlay content</p> -->
        <form class="features">
          <fieldset>
            <div class="check-group">
              <input type="checkbox" name="rail" id="rail" />
              <label for="rail">Rail</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="bus" id="bus" />
              <label for="bus">Bus</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="tram" id="tram" />
              <label for="tram">Tram</label>
            </div>
            <div class="check-group">
              <input
                type="checkbox"
                name="otherTransport"
                id="otherTransport"
              />
              <label for="otherTransport">Other transport</label>
            </div>
          </fieldset>
          <fieldset>
            <div class="check-group">
              <input type="checkbox" name="food" id="food" />
              <label for="food">Food</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="cafe" id="cafe" />
              <label for="cafe">Cafe</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="bar" id="bar" />
              <label for="bar">Bar</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="dessert" id="dessert" />
              <label for="dessert">Dessert</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="groceries" id="groceries" />
              <label for="groceries">Groceries</label>
            </div>
            <!-- <input type="checkbox" name="transport" id="transport" />
						<label for="transport">Transportation</label> -->
          </fieldset>
          <fieldset>
            <div class="check-group">
              <input type="checkbox" name="utils" id="utils" />
              <label for="utils">Utilities</label>
            </div>
            <div class="check-group">
              <input type="checkbox" name="healthcare" id="healthcare" />
              <label for="thealthcare">Healthcare</label>
            </div>
          </fieldset>
          <button class="reset">Reset</button>
        </form>
      </div>
      <div class="overlay right">
        <button data-toggle="overlay">Close</button>

        <template id="feature-sidebar-template">
          <h3></h3>
          <ul class="features"></ul>
        </template>
      </div>
      <div id="map"></div>
    </main>
    <script src="../../src/js/main.js" type="module"></script>
  </body>
</html>
